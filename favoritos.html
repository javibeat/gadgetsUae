<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites — GadgetsUAE</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/fonts.css?v=5.0">
    <link rel="stylesheet" href="assets/css/style.css?v=5.0">
</head>

<body>
    <div id="menu-include"></div>

    <main>
        <div class="container">
            <section class="page-hero">
                <h1>Your Favorites</h1>
                <p>Products you've saved for later.</p>
            </section>

            <section class="section">
                <div class="products-grid" id="favoritesGrid"></div>
            </section>
        </div>
    </main>

    <div id="footer-include"></div>
    <script src="assets/js/products.js?v=5.0"></script>
    <script src="assets/js/product-renderer.js?v=5.0"></script>
    <script src="assets/js/script.js?v=5.0"></script>
    <script type="module" src="assets/js/analytics.js?v=5.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
            const grid = document.getElementById('favoritesGrid');
            if (!grid || !window.products) return;

            const favProducts = window.products.filter(p => favs.includes(p.id));
            if (favProducts.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-2);text-align:center;padding:var(--s-2xl)">No favorites yet. Browse products and tap the heart icon to save them here.</p>';
                return;
            }

            const renderer = new ProductRenderer(favProducts);
            renderer.render('favoritesGrid', { limit: 50 });
        });
    </script>
</body>

</html>
