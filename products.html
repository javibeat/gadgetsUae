<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products — GadgetsUAE | Browse Tech Deals UAE</title>
    <meta name="description" content="Browse all curated tech products on GadgetsUAE. Gaming, smartphones, audio, laptops, smart home and more with Amazon.ae Prime delivery.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gadgetsdxb.com/products.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/fonts.css?v=5.0">
    <link rel="stylesheet" href="assets/css/style.css?v=5.0">
</head>

<body>
    <div id="menu-include"></div>

    <main>
        <div class="container">
            <section class="page-hero">
                <h1>All Products</h1>
                <p>Browse our curated selection of the best tech available in the UAE.</p>
            </section>

            <section class="section">
                <div class="products-grid stagger" id="all-products-grid"></div>
                <div class="view-more-wrap">
                    <a href="https://www.amazon.ae/s?k=electronics&tag=gadgetsdxb-21" class="btn-outline" target="_blank" rel="sponsored noopener noreferrer">Browse Amazon.ae &#8594;</a>
                </div>
            </section>
        </div>
    </main>

    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="container">
            <div class="search-header">
                <div class="search-input-wrap">
                    <input type="text" id="searchOverlayInput" placeholder="Search products..." aria-label="Search">
                </div>
                <button class="search-close" id="closeSearch" aria-label="Close search">&times;</button>
            </div>
            <div id="searchSuggestions" class="search-suggestions"></div>
            <div class="search-results">
                <div class="products-grid" id="searchResultsContent"></div>
            </div>
        </div>
    </div>

    <div id="footer-include"></div>
    <script src="assets/js/products.js?v=5.0"></script>
    <script src="assets/js/product-renderer.js?v=5.0"></script>
    <script src="assets/js/script.js?v=5.0"></script>
    <script src="assets/js/price-updater.js?v=5.0"></script>
    <script src="assets/js/jsonld-injector.js?v=5.0"></script>
    <script type="module" src="assets/js/analytics.js?v=5.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!window.products) return;
            const renderer = window.initRenderer(window.products);
            renderer.render('all-products-grid', { limit: 50 });
            if (window.priceUpdater) window.priceUpdater.updateAllPrices();
            fetch('/assets/data/prices.json').then(r=>r.json()).then(d=>ProductRenderer.updateTimestamps(d)).catch(()=>{});

            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.product-card').forEach(el => { el.classList.add('reveal'); obs.observe(el); });
        });
    </script>
</body>

</html>
